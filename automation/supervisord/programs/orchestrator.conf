; Orchestrator program configuration

[program:orchestrator]
command=%(ENV_HOME)s/work/Depository/Depository/.venv/bin/crystalclearhouse-orchestrator
directory=%(ENV_HOME)s/work/Depository/Depository
autostart=true
autorestart=true
startretries=3
stderr_logfile=/tmp/orchestrator.err.log
stdout_logfile=/tmp/orchestrator.out.log
user=%(ENV_USER)s
environment=PYTHONPATH="%(ENV_HOME)s/work/Depository/Depository/src"
